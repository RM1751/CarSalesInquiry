<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Admin Dashboard - Rahul Car Sales v3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .gradient-maruti { background: linear-gradient(135deg, #e67e00 0%, #cd873b 100%); }
        .dashboard-card { background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
        .photo-item { position: relative; aspect-ratio: 16/10; border-radius: 8px; overflow: hidden; }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; }
        .photo-delete { position: absolute; top: 4px; right: 4px; background: rgba(239,68,68,0.95); color: white; border: none; width: 24px; height: 24px; border-radius: 50%; cursor: pointer; }
        .category-tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; -webkit-overflow-scrolling: touch; }
        .category-tab { padding: 8px 16px; border-radius: 9999px; border: 2px solid #e2e8f0; background: white; color: #64748b; font-weight: 500; cursor: pointer; white-space: nowrap; }
        .category-tab.active { background: linear-gradient(135deg, #e67e00 0%, #cd873b 100%); border-color: #e67e00; color: white; }
        .url-input { width: 100%; padding: 10px 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 14px; }
        .url-input:focus { border-color: #e67e00; outline: none; }
        .add-btn { background: linear-gradient(135deg, #e67e00 0%, #cd873b 100%); color: white; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; }
        .save-indicator { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; }
        .save-indicator.saved { background: #dcfce7; color: #166534; }
        .save-indicator.saving { background: #dbeafe; color: #1e40af; }
        .success-msg { background: #dcfce7; border: 1px solid #86efac; color: #166534; padding: 12px 15px; border-radius: 8px; margin-bottom: 10px; font-size: 14px; font-weight: 500; }
        .error-msg { background: #fee2e2; border: 1px solid #fca5a5; color: #991b1b; padding: 12px 15px; border-radius: 8px; margin-bottom: 10px; font-size: 14px; font-weight: 500; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <header class="gradient-maruti text-white py-4 px-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center">
                    <i class="fas fa-user-shield"></i>
                </div>
                <div>
                    <h1 class="font-bold">Admin Dashboard</h1>
                    <p class="text-xs text-white/80">Rahul Car Sales</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <span id="saveStatus" class="save-indicator saved">
                    <i class="fas fa-check"></i> Saved
                </span>
                <a href="index.html" class="bg-white/20 px-4 py-2 rounded-lg text-sm">
                    <i class="fas fa-home mr-1"></i> View
                </a>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-6">
        <div class="grid lg:grid-cols-2 gap-6">
            <!-- HOMEPAGE SLIDER -->
            <div class="dashboard-card p-6">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-blue-500 rounded-lg flex items-center justify-center">
                            <i class="fas fa-images text-white"></i>
                        </div>
                        <div>
                            <h2 class="text-lg font-bold">Homepage Slider</h2>
                            <p class="text-xs text-slate-500">Background photos</p>
                        </div>
                    </div>
                    <span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded">Auto-save</span>
                </div>

                <!-- Messages -->
                <div id="sliderMsg" class="hidden mb-3"></div>

                <!-- Add URL Input -->
                <div class="flex gap-2 mb-4">
                    <input type="text" id="sliderUrlInput" class="url-input flex-1" placeholder="Paste Cloudinary image URL...">
                    <button onclick="addSliderPhoto()" class="add-btn">
                        <i class="fas fa-plus"></i> Add
                    </button>
                </div>

                <!-- Settings -->
                <div class="flex items-center justify-between mb-4 p-3 bg-slate-50 rounded-lg">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="enableSlider" checked class="w-4 h-4" onchange="updateSettings()">
                        <span class="text-sm">Enable slider</span>
                    </label>
                    <select id="sliderSpeed" class="text-sm border rounded px-2 py-1" onchange="updateSettings()">
                        <option value="3000">3 sec</option>
                        <option value="5000" selected>5 sec</option>
                        <option value="8000">8 sec</option>
                    </select>
                </div>

                <!-- Photos -->
                <div>
                    <p class="text-sm font-medium mb-2"><span id="sliderCount">0</span> photos</p>
                    <div class="photo-grid" id="sliderPhotoGrid">
                        <div class="col-span-full text-center py-8 bg-slate-50 rounded-xl border-2 border-dashed text-slate-400" id="emptySlider">
                            <i class="fas fa-images text-3xl mb-2"></i>
                            <p class="text-sm">No photos yet</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- CAR PHOTOS -->
            <div class="dashboard-card p-6">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-orange-500 rounded-lg flex items-center justify-center">
                            <i class="fas fa-car text-white"></i>
                        </div>
                        <div>
                            <h2 class="text-lg font-bold">Car Photos</h2>
                            <p class="text-xs text-slate-500">By car model</p>
                        </div>
                    </div>
                    <span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded">Auto-save</span>
                </div>

                <!-- Messages -->
                <div id="carMsg" class="hidden mb-3"></div>

                <!-- Category Tabs -->
                <div class="category-tabs mb-4" id="carTabs">
                    <button class="category-tab active" data-category="Alto">Alto</button>
                    <button class="category-tab" data-category="S-Presso">S-Presso</button>
                    <button class="category-tab" data-category="WagonR">WagonR</button>
                    <button class="category-tab" data-category="Celerio">Celerio</button>
                    <button class="category-tab" data-category="Swift">Swift</button>
                    <button class="category-tab" data-category="Dzire">Dzire</button>
                    <button class="category-tab" data-category="BREZZA">Brezza</button>
                    <button class="category-tab" data-category="Victoris">Victoris</button>
                    <button class="category-tab" data-category="Ertiga">Ertiga</button>
                    <button class="category-tab" data-category="Eeco">Eeco</button>
                </div>

                <!-- Add URL Input -->
                <div class="flex gap-2 mb-4">
                    <input type="text" id="carUrlInput" class="url-input flex-1" placeholder="Paste URL for selected car...">
                    <button onclick="addCarPhoto()" class="add-btn">
                        <i class="fas fa-plus"></i> Add
                    </button>
                </div>

                <!-- Current Category -->
                <div class="mb-4 p-3 bg-orange-50 rounded-lg">
                    <span class="text-sm text-slate-600">Selected: </span>
                    <span class="font-bold text-orange-600" id="currentCategoryDisplay">Alto</span>
                    <span class="text-sm text-slate-500 ml-2">(<span id="carPhotoCount">0</span> photos)</span>
                </div>

                <!-- Photos -->
                <div class="photo-grid" id="carPhotoGrid">
                    <div class="col-span-full text-center py-8 bg-slate-50 rounded-xl border-2 border-dashed text-slate-400" id="emptyCar">
                        <i class="fas fa-car text-3xl mb-2"></i>
                        <p class="text-sm">No photos for this car</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Data
        let appData = {
            sliderPhotos: [],
            carPhotos: {},
            sliderEnabled: true,
            sliderSpeed: 5000
        };
        let currentCategory = 'Alto';

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Admin page loaded');
            loadData();
            initCategoryTabs();
        });

        function loadData() {
            try {
                const saved = localStorage.getItem('rahulCarSalesData');
                if (saved) {
                    appData = JSON.parse(saved);
                    console.log('Loaded data:', appData);
                }
            } catch (e) {
                console.error('Error loading data:', e);
            }
            
            document.getElementById('enableSlider').checked = appData.sliderEnabled !== false;
            document.getElementById('sliderSpeed').value = appData.sliderSpeed || 5000;
            renderAll();
        }

        function saveData() {
            try {
                localStorage.setItem('rahulCarSalesData', JSON.stringify(appData));
                console.log('Saved data');
                updateSaveStatus('saved');
            } catch (e) {
                console.error('Error saving:', e);
                updateSaveStatus('error');
            }
        }

        function updateSettings() {
            appData.sliderEnabled = document.getElementById('enableSlider').checked;
            appData.sliderSpeed = parseInt(document.getElementById('sliderSpeed').value);
            saveData();
        }

        function updateSaveStatus(status) {
            const el = document.getElementById('saveStatus');
            if (status === 'saved') {
                el.className = 'save-indicator saved';
                el.innerHTML = '<i class="fas fa-check"></i> Saved';
            }
        }

        function showMessage(elementId, message, type) {
            const el = document.getElementById(elementId);
            el.className = type === 'success' ? 'success-msg' : 'error-msg';
            el.innerHTML = '<i class="fas fa-' + (type === 'success' ? 'check-circle' : 'exclamation-circle') + ' mr-2"></i> ' + message;
            el.classList.remove('hidden');
            
            // Auto hide after 3 seconds
            setTimeout(function() {
                el.classList.add('hidden');
            }, 3000);
        }

        function initCategoryTabs() {
            console.log('Initializing category tabs...');
            const tabs = document.querySelectorAll('#carTabs .category-tab');
            console.log('Found tabs:', tabs.length);
            
            tabs.forEach(function(tab) {
                tab.addEventListener('click', function() {
                    const category = this.getAttribute('data-category');
                    console.log('Clicked category:', category);
                    
                    // Update active state
                    tabs.forEach(function(t) { t.classList.remove('active'); });
                    this.classList.add('active');
                    
                    // Update current category
                    currentCategory = category;
                    document.getElementById('currentCategoryDisplay').textContent = category;
                    
                    // Re-render photos
                    renderCarPhotos();
                    
                    // Show feedback
                    showMessage('carMsg', 'Switched to ' + category, 'success');
                });
            });
        }

        function addSliderPhoto() {
            const input = document.getElementById('sliderUrlInput');
            const url = input.value.trim();
            
            if (!url) {
                showMessage('sliderMsg', 'Please enter a URL', 'error');
                return;
            }
            
            if (!url.startsWith('http')) {
                showMessage('sliderMsg', 'URL must start with http', 'error');
                return;
            }

            console.log('Adding slider photo:', url);
            appData.sliderPhotos.push({ id: Date.now(), url: url });
            input.value = '';
            renderSliderPhotos();
            saveData();
            showMessage('sliderMsg', 'Photo added to slider!', 'success');
        }

        function addCarPhoto() {
            console.log('addCarPhoto called, current category:', currentCategory);
            
            const input = document.getElementById('carUrlInput');
            const url = input.value.trim();
            
            console.log('URL entered:', url);
            
            if (!url) {
                showMessage('carMsg', 'Please enter a URL', 'error');
                return;
            }
            
            if (!url.startsWith('http')) {
                showMessage('carMsg', 'URL must start with http', 'error');
                return;
            }

            // Initialize array if needed
            if (!appData.carPhotos[currentCategory]) {
                appData.carPhotos[currentCategory] = [];
            }

            // Add photo
            appData.carPhotos[currentCategory].push({
                id: Date.now(),
                url: url,
                category: currentCategory
            });
            
            console.log('Photo added. Total photos for', currentCategory, ':', appData.carPhotos[currentCategory].length);
            
            // Clear input
            input.value = '';
            
            // Update display
            renderCarPhotos();
            
            // Save
            saveData();
            
            // Show success
            showMessage('carMsg', 'Photo added to ' + currentCategory + '! Photo count: ' + appData.carPhotos[currentCategory].length, 'success');
        }

        function renderAll() {
            renderSliderPhotos();
            renderCarPhotos();
        }

        function renderSliderPhotos() {
            const grid = document.getElementById('sliderPhotoGrid');
            const empty = document.getElementById('emptySlider');
            const photos = appData.sliderPhotos || [];
            
            document.getElementById('sliderCount').textContent = photos.length;

            if (photos.length === 0) {
                grid.innerHTML = '';
                grid.appendChild(empty);
                empty.style.display = 'block';
                return;
            }

            empty.style.display = 'none';
            grid.innerHTML = photos.map(function(photo) {
                return '<div class="photo-item">' +
                    '<img src="' + photo.url + '" alt="Photo">' +
                    '<button class="photo-delete" onclick="deleteSliderPhoto(' + photo.id + ')">' +
                        '<i class="fas fa-times"></i>' +
                    '</button>' +
                '</div>';
            }).join('');
        }

        function renderCarPhotos() {
            const grid = document.getElementById('carPhotoGrid');
            const empty = document.getElementById('emptyCar');
            const photos = appData.carPhotos && appData.carPhotos[currentCategory] ? appData.carPhotos[currentCategory] : [];
            
            document.getElementById('carPhotoCount').textContent = photos.length;

            if (photos.length === 0) {
                grid.innerHTML = '';
                grid.appendChild(empty);
                empty.style.display = 'block';
                return;
            }

            empty.style.display = 'none';
            grid.innerHTML = photos.map(function(photo) {
                return '<div class="photo-item">' +
                    '<img src="' + photo.url + '" alt="' + currentCategory + '">' +
                    '<button class="photo-delete" onclick="deleteCarPhoto(' + photo.id + ')">' +
                        '<i class="fas fa-times"></i>' +
                    '</button>' +
                '</div>';
            }).join('');
        }

        function deleteSliderPhoto(id) {
            if (!confirm('Delete this photo?')) return;
            appData.sliderPhotos = appData.sliderPhotos.filter(function(p) { return p.id !== id; });
            renderSliderPhotos();
            saveData();
        }

        function deleteCarPhoto(id) {
            if (!confirm('Delete this photo?')) return;
            if (appData.carPhotos[currentCategory]) {
                appData.carPhotos[currentCategory] = appData.carPhotos[currentCategory].filter(function(p) { return p.id !== id; });
                renderCarPhotos();
                saveData();
            }
        }

        // Enter key support
        document.getElementById('sliderUrlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addSliderPhoto();
        });
        document.getElementById('carUrlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addCarPhoto();
        });
    </script>
</body>
</html>
